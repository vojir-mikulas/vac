name: CI

# Temporarily disabled: automatic triggers removed so CI does not run.
# Re-enable by uncommenting the push/pull_request triggers below.
on:
  workflow_dispatch: {}
  # push:
  #   branches: ["main"]
  #   paths-ignore: ["docs/**", "**/*.md"]
  # pull_request:
  #   paths-ignore: ["docs/**", "**/*.md"]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pin the linter — `latest` lets a new upstream release add rules that
          # turn CI red with zero code change. Bump deliberately.
          version: v2.12.2
          working-directory: api
      - name: UI lint + format check
        run: make lint-ui

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Go unit tests (race)
        run: make test-go
      - name: UI unit tests
        run: make test-ui
      - name: Typecheck
        run: make typecheck
