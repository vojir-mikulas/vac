name: Release

# Everything that happens on a version tag (e.g. v0.5.0) lives here:
#   - build:            multi-arch GHCR images (vac-api, vac-proxy)
#   - installer-assets: install scripts + compose published to gh-pages
# Re-tag-friendly: pushing v0.5.1 builds and tags :0.5.1, :0.5, :latest.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# A re-pushed tag won't double-build, but an in-flight release isn't aborted
# mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: vac-api
            context: .
            dockerfile: api/Dockerfile
          - image: vac-proxy
            context: ./proxy
            dockerfile: ./proxy/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VAC_VERSION=${{ github.ref_name }}
            VAC_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  installer-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare public assets
        run: |
          mkdir public
          cp scripts/install.sh public/install.sh
          cp scripts/uninstall.sh public/uninstall.sh
          cp scripts/migrate.sh public/migrate.sh
          cp compose.prod.yaml public/compose.prod.yaml

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
