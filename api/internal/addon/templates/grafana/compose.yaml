# Grafana add-on (Track D / D3 flagship). Deploys through VAC's normal pipeline
# as a user app: built (no-op for an image-only service), upped, attached to
# vac-edge, and routed by Caddy to grafana:3000. No host ports — HTTP services
# are reached over vac-edge by alias.
services:
  grafana:
    image: grafana/grafana-oss:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Serve under the auto-assigned VAC subdomain at the path root.
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
    expose:
      - "3000"
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  grafana-data:
