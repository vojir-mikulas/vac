<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Down for maintenance</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0b0d12;
        color: #e6e8ee;
      }
      .card {
        max-width: 30rem;
        margin: 1.5rem;
        padding: 2.5rem;
        text-align: center;
      }
      .glyph {
        font-size: 2.5rem;
        line-height: 1;
      }
      h1 {
        margin: 1.25rem 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 650;
      }
      p {
        margin: 0;
        color: #9aa1b1;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="glyph">&#128679;</div>
      <h1>We&rsquo;ll be right back</h1>
      <p>This site is temporarily down for maintenance. Please check back in a few minutes.</p>
    </main>
  </body>
</html>
