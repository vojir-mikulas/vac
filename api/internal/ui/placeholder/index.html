<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VAC — UI not embedded</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background: #16171d;
        color: #e5e7eb;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        line-height: 1.5;
      }
      .card {
        max-width: 36rem;
        text-align: center;
      }
      h1 {
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      code {
        background: #1f2028;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        font-size: 0.9em;
      }
      p {
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>VAC API is running</h1>
      <p>The UI is not embedded in this build.</p>
      <p>
        Build with the embed tag: <code>make build</code> (which runs
        <code>vite build</code> first, then <code>go build -tags embedui</code>),
        or in development run <code>pnpm --filter ui dev</code> and use the Vite
        dev server which proxies <code>/api</code> here.
      </p>
    </div>
  </body>
</html>
