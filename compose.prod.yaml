# Production compose for VAC — pulls prebuilt images from the registry instead
# of building from source. Used by the `curl get.vac.vojir.io | sh` installer.
#
# Image refs are overridable:
#   VAC_REGISTRY  (default ghcr.io/vojir-mikulas)
#   VAC_VERSION   (default latest — the installer pins a real version)
#
# Everything else mirrors ./compose.yaml. Keep the two in sync.

services:
  vac-db:
    image: postgres:16-alpine
    # Explicit container_name avoids the compose-generated "vac-vac-db-1".
    # These services are singletons (never scaled), so a fixed name is safe.
    container_name: vac-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vac
      POSTGRES_PASSWORD: ${VAC_DB_PASSWORD:?VAC_DB_PASSWORD is required}
      POSTGRES_DB: vac
    volumes:
      - vac_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vac -d vac"]
      interval: 5s
      timeout: 3s
      retries: 10

  vac-api:
    image: ${VAC_REGISTRY:-ghcr.io/vojir-mikulas}/vac-api:${VAC_VERSION:-latest}
    container_name: vac-api
    restart: unless-stopped
    depends_on:
      vac-db:
        condition: service_healthy
    environment:
      VAC_PORT: "9393"
      VAC_HOST: "0.0.0.0"
      VAC_DATABASE_URL: "postgres://vac:${VAC_DB_PASSWORD}@vac-db:5432/vac?sslmode=disable"
      VAC_MASTER_KEY: ${VAC_MASTER_KEY:?VAC_MASTER_KEY is required (32 bytes hex)}
      VAC_WORK_DIR: "/var/lib/vac/repos"
      VAC_DOCKER_SOCKET: "/var/run/docker.sock"
      VAC_CADDY_ADMIN_URL: "http://vac-proxy:2019"
      VAC_EDGE_NETWORK: "vac-edge"
      VAC_CADDY_ACCESS_LOG: "/var/log/caddy/access.log"
      # Bearer token gating /metrics + /debug/* (Prometheus exposition and the
      # RAM benchmark). Empty (default) leaves both endpoints closed (404); set
      # it to scrape VAC with your own Prometheus.
      VAC_METRICS_TOKEN: "${VAC_METRICS_TOKEN:-}"
      # Automatic {app}.{domain} subdomains + HTTPS for the dashboard itself
      # (vac.<domain>). Empty leaves the dashboard on plain HTTP and disables
      # auto-subdomains; custom per-app domains still work. Set later without
      # editing this file: `vac set-domain <domain>`.
      VAC_BASE_DOMAIN: "${VAC_BASE_DOMAIN:-}"
      # Override the dashboard hostname (defaults to vac.<base domain>).
      VAC_CONTROL_DOMAIN: "${VAC_CONTROL_DOMAIN:-}"
      # Track D master gate. Off by default — set to "true" in your .env to expose
      # managed backups, managed databases, and the add-on catalog (and start
      # their background workers). VAC_MASTER_KEY is required when on.
      VAC_MANAGED_SERVICES: "${VAC_MANAGED_SERVICES:-}"
      # Point managed Postgres at a separate vac-db-managed instance for
      # blast-radius isolation instead of sharing the control-plane DB.
      VAC_MANAGED_DB_ISOLATED: "${VAC_MANAGED_DB_ISOLATED:-}"
      # Interactive container shell (P3.4). Off by default — when "true" it lets
      # the operator open a root-capable shell into a user app container from the
      # dashboard (gated by a confirm + audit-logged). Highest blast-radius
      # feature, so it stays closed until you opt in: `vac container-shell on`.
      VAC_ENABLE_SHELL: "${VAC_ENABLE_SHELL:-}"
      # Soft heap ceiling: keeps the control plane pacing GC against the
      # <200 MB idle target (plan 07) and, paired with the hard memory limit
      # below, makes a memory regression OOM in testing rather than on a user's
      # box. GOMEMLIMIT is a soft target; the limit below is the hard wall.
      GOMEMLIMIT: "${VAC_GOMEMLIMIT:-188743680}" # 180 MiB
      GOGC: "${VAC_GOGC:-100}"
    ports:
      - "${VAC_HOST_PORT:-9393}:9393"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vac_repos:/var/lib/vac/repos
      - vac_caddy_logs:/var/log/caddy:ro
    group_add:
      - "${DOCKER_GID:-999}"
    # Hard memory wall for the control plane (excludes vac-db). 256 MiB leaves
    # headroom above the 180 MiB soft target so a transient spike doesn't OOM,
    # while still catching a real regression. Tune via VAC_API_MEM_LIMIT.
    mem_limit: ${VAC_API_MEM_LIMIT:-256m}

  vac-proxy:
    image: ${VAC_REGISTRY:-ghcr.io/vojir-mikulas}/vac-proxy:${VAC_VERSION:-latest}
    container_name: vac-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - vac_caddy_logs:/var/log/caddy
    networks:
      - default
      - vac-edge

networks:
  vac-edge:
    name: vac-edge

volumes:
  vac_db_data:
  vac_repos:
  vac_caddy_logs:
  caddy_data:
  caddy_config:
