# Production compose for VAC — pulls prebuilt images from the registry instead
# of building from source. Used by the `curl get.vac.vojir.io | sudo sh` installer.
#
# Image refs are overridable:
#   VAC_REGISTRY  (default ghcr.io/vojir-mikulas)
#   VAC_VERSION   (default latest — the installer pins a real version)
#
# Everything else mirrors ./compose.yaml. Keep the two in sync.

services:
  vac-db:
    image: postgres:16-alpine
    # Explicit container_name avoids the compose-generated "vac-vac-db-1".
    # These services are singletons (never scaled), so a fixed name is safe.
    container_name: vac-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vac
      POSTGRES_PASSWORD: ${VAC_DB_PASSWORD:?VAC_DB_PASSWORD is required}
      POSTGRES_DB: vac
    volumes:
      - vac_db_data:/var/lib/postgresql/data
    # Localhost-only, for operator debugging — apps reach vac-db over vac-edge,
    # not the host. Published on an unusual host port (not 5432) so it never
    # collides with a user app that publishes its own Postgres on the standard
    # port; VAC forwards user `ports:` to Docker verbatim. The container still
    # listens on 5432 internally, so VAC_DATABASE_URL / connstrings are unchanged.
    # Override with VAC_DB_HOST_PORT in .env.
    ports:
      - "127.0.0.1:${VAC_DB_HOST_PORT:-9432}:5432"
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vac -d vac"]
      interval: 5s
      timeout: 3s
      retries: 10

  vac-api:
    image: ${VAC_REGISTRY:-ghcr.io/vojir-mikulas}/vac-api:${VAC_VERSION:-latest}
    container_name: vac-api
    restart: unless-stopped
    depends_on:
      vac-db:
        condition: service_healthy
    environment:
      VAC_PORT: "9393"
      VAC_HOST: "0.0.0.0"
      VAC_DATABASE_URL: "postgres://vac:${VAC_DB_PASSWORD}@vac-db:5432/vac?sslmode=disable"
      VAC_MASTER_KEY: ${VAC_MASTER_KEY:?VAC_MASTER_KEY is required (32 bytes hex)}
      VAC_WORK_DIR: "/var/lib/vac/repos"
      VAC_DOCKER_SOCKET: "/var/run/docker.sock"
      VAC_CADDY_ADMIN_URL: "http://vac-proxy:2019"
      VAC_EDGE_NETWORK: "vac-edge"
      VAC_CADDY_ACCESS_LOG: "/var/log/caddy/access.log"
      # Read-only host security agent (fail2ban/firewall). Opt-in — like the
      # container shell / managed services — because it installs a host-level
      # systemd timer outside the compose stack. Off leaves the control plane
      # unable to see host state (it's sandboxed), so the posture panel shows
      # "monitoring off" rather than a false "not detected". Toggle any time with
      # `vac security-agent on|off`. The agent pushes its snapshot into VAC_SECURITY_DIR.
      VAC_SECURITY_AGENT: "${VAC_SECURITY_AGENT:-}"
      VAC_SECURITY_DIR: "/var/lib/vac/security"
      # Bearer token gating /metrics + /debug/* (Prometheus exposition and the
      # RAM benchmark). Empty (default) leaves both endpoints closed (404); set
      # it to scrape VAC with your own Prometheus.
      VAC_METRICS_TOKEN: "${VAC_METRICS_TOKEN:-}"
      # Automatic {app}.{domain} subdomains + HTTPS for the dashboard itself
      # (vac.<domain>). Empty leaves the dashboard on plain HTTP and disables
      # auto-subdomains; custom per-app domains still work. Set later without
      # editing this file: `vac set-domain <domain>`.
      VAC_BASE_DOMAIN: "${VAC_BASE_DOMAIN:-}"
      # Override the dashboard hostname (defaults to vac.<base domain>).
      VAC_CONTROL_DOMAIN: "${VAC_CONTROL_DOMAIN:-}"
      # Track D master gate. Off by default — set to "true" in your .env to expose
      # managed backups, managed databases, and the add-on catalog (and start
      # their background workers). VAC_MASTER_KEY is required when on.
      VAC_MANAGED_SERVICES: "${VAC_MANAGED_SERVICES:-}"
      # Point managed Postgres at a separate vac-db-managed instance for
      # blast-radius isolation instead of sharing the control-plane DB.
      VAC_MANAGED_DB_ISOLATED: "${VAC_MANAGED_DB_ISOLATED:-}"
      # Interactive container shell (P3.4). Off by default — when "true" it lets
      # the operator open a root-capable shell into a user app container from the
      # dashboard (gated by a confirm + audit-logged). Highest blast-radius
      # feature, so it stays closed until you opt in: `vac container-shell on`.
      VAC_ENABLE_SHELL: "${VAC_ENABLE_SHELL:-}"
      # Scale-to-zero / idle-suspend (docs/plans/scale-to-zero.md). Master gate,
      # off by default — when "true" the sweeper stops apps that have opted in and
      # gone idle, and Caddy wakes them on the next request. The per-app toggle in
      # the dashboard stays hidden until this is on. Toggle: `vac idle-suspend on`.
      VAC_IDLE_SUSPEND: "${VAC_IDLE_SUSPEND:-}"
      # Inactivity window before an opted-in app is suspended (per-app override
      # wins). Go duration, e.g. "15m", "2h". Empty = built-in default (15m).
      VAC_IDLE_TIMEOUT: "${VAC_IDLE_TIMEOUT:-}"
      # How often the sweeper scans for idle apps. Go duration; empty = 1m.
      VAC_IDLE_SWEEP_INTERVAL: "${VAC_IDLE_SWEEP_INTERVAL:-}"
      # Soft heap ceiling: keeps the control plane pacing GC against the
      # <200 MB idle target (plan 07) and, paired with the hard memory limit
      # below, makes a memory regression OOM in testing rather than on a user's
      # box. GOMEMLIMIT is a soft target; the limit below is the hard wall.
      GOMEMLIMIT: "${VAC_GOMEMLIMIT:-188743680}" # 180 MiB
      GOGC: "${VAC_GOGC:-100}"
      # Box-wide CPU ceiling per user app container, applied as a `cpus:` compose
      # override at deploy. Empty/0 (default) = unlimited; set e.g. "1.5" so one
      # runaway app can't pin every core and starve the control plane. Global
      # knob — a per-app, UI-settable limit (like memory) is future work.
      VAC_APP_CPU_LIMIT: "${VAC_APP_CPU_LIMIT:-}"
    ports:
      - "${VAC_HOST_PORT:-9393}:9393"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vac_repos:/var/lib/vac/repos
      # Caddy's JSON access log (read-only) — tailed for request metrics. A host
      # bind mount (not a named volume, unlike dev compose.yaml) so the path is
      # stable and host tools can read it: the install docs point fail2ban at
      # /var/log/vac/caddy/access.log to auto-ban request floods. The directory
      # is created by the installer / `docker compose up`.
      - /var/log/vac/caddy:/var/log/caddy:ro
      # Host security snapshot — a host bind mount (not a named volume) so the
      # host-side vac-security-agent can write it; vac-api only reads it.
      - /var/lib/vac/security:/var/lib/vac/security:ro
      # Manual-ban queue — a read-write subdir nested inside the read-only mount
      # above (the more-specific mount wins). vac-api drops validated ban
      # requests here; the host agent drains them. Keeping the snapshot itself
      # read-only means a compromised control plane still can't forge state.
      - /var/lib/vac/security/commands:/var/lib/vac/security/commands:rw
    group_add:
      - "${DOCKER_GID:-999}"
    # Hard memory wall for the control plane (excludes vac-db). 256 MiB leaves
    # headroom above the 180 MiB soft target so a transient spike doesn't OOM,
    # while still catching a real regression. Tune via VAC_API_MEM_LIMIT.
    mem_limit: ${VAC_API_MEM_LIMIT:-256m}
    # Liveness probe — deliberately not `curl -f`: any HTTP response (incl. the
    # 503 /health returns when a dependency is down) means the API process is
    # responsive, which is what we test here. A hang or crash yields no response
    # and trips unhealthy, making `docker ps` / external monitors honest. NOTE:
    # `restart: unless-stopped` only restarts on process EXIT, not on unhealthy —
    # surfacing a hang as unhealthy is the win; auto-restart-on-hang needs an
    # autoheal sidecar (not added here). start_period covers boot migrations.
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://127.0.0.1:9393/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  vac-proxy:
    image: ${VAC_REGISTRY:-ghcr.io/vojir-mikulas}/vac-proxy:${VAC_VERSION:-latest}
    container_name: vac-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      # Stable host path for the access log (see vac-api above) — fail2ban and
      # other host-side tooling read it directly at /var/log/vac/caddy.
      - /var/log/vac/caddy:/var/log/caddy
    # Liveness probe against the admin API (busybox wget — caddy:2-alpine has no
    # curl). If Caddy crashes or wedges, all ingress is down while vac-api still
    # looks up; this makes that visible instead of silent. Admin binds
    # 0.0.0.0:2019 (see proxy/Caddyfile), so loopback reaches it.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - default
      - vac-edge

networks:
  vac-edge:
    name: vac-edge

volumes:
  vac_db_data:
  vac_repos:
  # vac_caddy_logs is intentionally absent in prod — the Caddy access log is a
  # host bind mount (/var/log/vac/caddy) so fail2ban can read it directly. Dev
  # compose.yaml still uses the named volume.
  caddy_data:
  caddy_config:
