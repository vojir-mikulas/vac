# Production compose for VAC — pulls prebuilt images from the registry instead
# of building from source. Used by the `curl get.vac.vojir.io | sh` installer.
#
# Image refs are overridable:
#   VAC_REGISTRY  (default ghcr.io/vojir)
#   VAC_VERSION   (default latest — the installer pins a real version)
#
# Everything else mirrors ./compose.yaml. Keep the two in sync.

services:
  vac-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vac
      POSTGRES_PASSWORD: ${VAC_DB_PASSWORD:?VAC_DB_PASSWORD is required}
      POSTGRES_DB: vac
    volumes:
      - vac_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vac -d vac"]
      interval: 5s
      timeout: 3s
      retries: 10

  vac-api:
    image: ${VAC_REGISTRY:-ghcr.io/vojir}/vac-api:${VAC_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      vac-db:
        condition: service_healthy
    environment:
      VAC_PORT: "3000"
      VAC_HOST: "0.0.0.0"
      VAC_DATABASE_URL: "postgres://vac:${VAC_DB_PASSWORD}@vac-db:5432/vac?sslmode=disable"
      VAC_MASTER_KEY: ${VAC_MASTER_KEY:?VAC_MASTER_KEY is required (32 bytes hex)}
      VAC_WORK_DIR: "/var/lib/vac/repos"
      VAC_DOCKER_SOCKET: "/var/run/docker.sock"
      VAC_CADDY_ADMIN_URL: "http://vac-proxy:2019"
      VAC_EDGE_NETWORK: "vac-edge"
      VAC_CADDY_ACCESS_LOG: "/var/log/caddy/access.log"
      # Automatic {app}.{domain} subdomains. Empty disables them (custom domains
      # still work). Set later without editing this file: `vac set-domain <d>`.
      VAC_BASE_DOMAIN: "${VAC_BASE_DOMAIN:-}"
    ports:
      - "${VAC_HOST_PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vac_repos:/var/lib/vac/repos
      - vac_caddy_logs:/var/log/caddy:ro
    group_add:
      - "${DOCKER_GID:-999}"

  vac-proxy:
    image: ${VAC_REGISTRY:-ghcr.io/vojir}/vac-proxy:${VAC_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - vac_caddy_logs:/var/log/caddy
    networks:
      - default
      - vac-edge

networks:
  vac-edge:
    name: vac-edge

volumes:
  vac_db_data:
  vac_repos:
  vac_caddy_logs:
  caddy_data:
  caddy_config:
