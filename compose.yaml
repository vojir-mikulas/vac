services:
  vac-db:
    image: postgres:16-alpine
    # Explicit container_name avoids the compose-generated "vac-vac-db-1".
    # These services are singletons (never scaled), so a fixed name is safe.
    container_name: vac-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vac
      POSTGRES_PASSWORD: ${VAC_DB_PASSWORD:?VAC_DB_PASSWORD is required}
      POSTGRES_DB: vac
    volumes:
      - vac_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vac -d vac"]
      interval: 5s
      timeout: 3s
      retries: 10

  vac-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: vac-api
    restart: unless-stopped
    depends_on:
      vac-db:
        condition: service_healthy
    environment:
      VAC_PORT: "3000"
      VAC_HOST: "0.0.0.0"
      VAC_DATABASE_URL: "postgres://vac:${VAC_DB_PASSWORD}@vac-db:5432/vac?sslmode=disable"
      VAC_MASTER_KEY: ${VAC_MASTER_KEY:?VAC_MASTER_KEY is required (32 bytes hex)}
      VAC_WORK_DIR: "/var/lib/vac/repos"
      VAC_DOCKER_SOCKET: "/var/run/docker.sock"
      VAC_CADDY_ADMIN_URL: "http://vac-proxy:2019"
      VAC_EDGE_NETWORK: "vac-edge"
      VAC_CADDY_ACCESS_LOG: "/var/log/caddy/access.log"
      # Bearer token gating /metrics + /debug/* (Prometheus exposition and the
      # RAM benchmark). Empty (default) leaves both endpoints closed (404).
      VAC_METRICS_TOKEN: "${VAC_METRICS_TOKEN:-}"
      # Set VAC_BASE_DOMAIN in your .env to put the dashboard on HTTPS
      # (vac.<domain>) and enable automatic {app}.{domain} subdomains. Empty
      # leaves the dashboard on plain HTTP and disables auto-subdomains
      # (custom domains still work).
      VAC_BASE_DOMAIN: "${VAC_BASE_DOMAIN:-}"
      # Override the dashboard hostname (defaults to vac.<base domain>).
      VAC_CONTROL_DOMAIN: "${VAC_CONTROL_DOMAIN:-}"
    ports:
      - "${VAC_HOST_PORT:-3000}:3000"
    volumes:
      # Host Docker socket — VAC drives user app stacks via the host's daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent working tree for cloned repos + generated compose files.
      - vac_repos:/var/lib/vac/repos
      # Caddy's JSON access log (read-only) — tailed for request metrics.
      - vac_caddy_logs:/var/log/caddy:ro
    # Supplementary group so the non-root `vac` user can read the docker socket.
    # Linux: set DOCKER_GID to `getent group docker | cut -d: -f3` in .env.
    # Docker Desktop (macOS/Windows): the default 999 usually works.
    group_add:
      - "${DOCKER_GID:-999}"

  vac-proxy:
    build:
      context: ./proxy
    container_name: vac-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # Certs + ACME account state — MUST persist or every restart re-issues.
      - caddy_data:/data
      # Caddy's own config autosave.
      - caddy_config:/config
      # Shared access log, tailed read-only by vac-api for request metrics.
      - vac_caddy_logs:/var/log/caddy
    networks:
      # default: reach vac-api (ask hook) and be reached by vac-api (admin API).
      - default
      # vac-edge: reach user app containers by alias. vac-api is intentionally
      # NOT on this network so user containers can't reach the VAC API.
      - vac-edge

networks:
  vac-edge:
    # Explicit name (no compose project prefix) so VAC can attach app containers
    # from their own compose projects to the same network by this literal name.
    name: vac-edge

volumes:
  vac_db_data:
  vac_repos:
  vac_caddy_logs:
  caddy_data:
  caddy_config:
