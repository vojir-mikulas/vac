# fail2ban action that actually blocks traffic to Docker-published ports.
#
# WHY THIS EXISTS: Docker publishes container ports (Caddy's 80/443) via DNAT in
# the nat/PREROUTING + FORWARD path. That traffic NEVER traverses the filter
# INPUT chain, so fail2ban's stock iptables actions (which insert into INPUT)
# "ban" an IP yet keep serving it. Docker provides the DOCKER-USER chain
# specifically for operator rules that run BEFORE its own forwarding rules —
# dropping there reliably blocks the flood.
#
# Bans are inserted at runtime and re-applied by fail2ban on start from its
# persistent ban DB. They do not survive a host reboot on their own; fail2ban
# restores them when the service comes back up.

[Definition]

# DOCKER-USER is created by the Docker daemon; nothing to set up/tear down here.
actionstart =
actionstop =

# Make sure the chain exists before we try to use it (Docker must be running).
actioncheck = iptables -n -L DOCKER-USER >/dev/null

actionban   = iptables -I DOCKER-USER -s <ip> -j DROP
actionunban = iptables -D DOCKER-USER -s <ip> -j DROP

[Init]
