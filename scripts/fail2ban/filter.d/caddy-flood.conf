# fail2ban filter for VAC's Caddy access log (JSON format).
#
# Every handled request is one log line carrying "client_ip". We treat each
# line as a "failure" so the jail can count requests-per-IP and ban anything
# that exceeds the rate set by maxretry/findtime in the jail — i.e. a flood.
#
# Caddy resolves the real client into request.client_ip (honouring trusted
# proxies), so banning <HOST> bans the actual source, not an upstream proxy.

[Definition]

# Match the client IP on any access-log line.
failregex = "client_ip":"<HOST>"

# Caddy's default JSON encoder writes the timestamp as a Unix epoch float,
# e.g. "ts":1718600000.1234567 . EPOCH parses both integer and fractional.
# If `fail2ban-regex` (see scripts/fail2ban/README.md) reports 0 date hits on
# your real log, comment this line out — fail2ban then uses the line read time,
# which is fine for a live-tailed log.
datepattern = "ts":{EPOCH}

# Don't ban yourself / health checks. Add more IPs as needed.
ignoreregex =
